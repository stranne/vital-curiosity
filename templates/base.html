<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ config.title }}{% endblock %}</title>
    <meta name="description" content="{% block description %}{{ config.description }}{% endblock %}">

    <link rel="icon" href="/img/logo.svg" type="image/svg+xml">
    <link rel="alternate" type="application/atom+xml" title="Atom Feed" href="/atom.xml">
    <link rel="alternate" type="application/rss+xml" title="RSS Feed" href="/rss.xml">

    <link rel="stylesheet" href="/style.css">

    {% if config.extra.umami_website_id %}
        <script defer src="https://cloud.umami.is/script.js" data-website-id="{{ config.extra.umami_website_id }}"></script>
    {% endif %}
    {% block scripts %}{% endblock %}
</head>
<body>
    <div class="bg-layer" aria-hidden="true">
        {% if config.extra.background_image %}
            <img src="{{ config.extra.background_image }}" alt="" class="bg-image" loading="eager">
        {% endif %}
        <div class="bg-overlay"></div>
    </div>

    <header class="site-header glass">
        <nav class="site-nav">
            <a href="/" class="site-brand">
                <svg class="site-logo" width="28" height="28" viewBox="-14 -14 28 28" aria-hidden="true">
                    <g stroke="currentColor" stroke-width="0.6" stroke-linecap="round" opacity="0.35">
                        <line x1="0" y1="0" x2="-8" y2="-12"/><line x1="0" y1="0" x2="10" y2="-8"/>
                        <line x1="0" y1="0" x2="-11" y2="4"/><line x1="0" y1="0" x2="5" y2="11"/>
                        <line x1="0" y1="0" x2="12" y2="4"/><line x1="-8" y1="-12" x2="-12" y2="-13"/>
                        <line x1="10" y1="-8" x2="13" y2="-11"/><line x1="5" y1="11" x2="7" y2="13"/>
                    </g>
                    <circle cx="-12" cy="-13" r="0.9" fill="currentColor" opacity="0.25"/>
                    <circle cx="13" cy="-11" r="0.9" fill="currentColor" opacity="0.25"/>
                    <circle cx="7" cy="13" r="0.8" fill="currentColor" opacity="0.25"/>
                    <circle cx="-11" cy="4" r="1.3" fill="currentColor" opacity="0.4"/>
                    <circle cx="5" cy="11" r="1.3" fill="currentColor" opacity="0.4"/>
                    <circle cx="12" cy="4" r="1.1" fill="currentColor" opacity="0.35"/>
                    <circle cx="-8" cy="-12" r="1.6" fill="currentColor" opacity="0.55"/>
                    <circle cx="10" cy="-8" r="1.6" fill="currentColor" opacity="0.55"/>
                    <path d="M0,-5 L1.2,-1.2 L5,0 L1.2,1.2 L0,5 L-1.2,1.2 L-5,0 L-1.2,-1.2 Z" fill="currentColor" opacity="0.85"/>
                    <circle cx="0" cy="0" r="1.8" fill="currentColor" opacity="0.85"/>
                </svg>
                <span class="site-name">{{ config.title }}</span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link">Posts</a>
                <a href="/tags/" class="nav-link">Tags</a>
                <a href="/atom.xml" class="nav-link" title="Feed">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/>
                    </svg>
                </a>
            </div>
        </nav>
    </header>

    <main class="site-main">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>&copy; {{ now() | date(format="%Y") }} {{ config.extra.author_name }}</p>
    </footer>
</body>
</html>
