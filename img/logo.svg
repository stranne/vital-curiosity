    <line x1="0" y1="0" x2="-8" y2="-12"/>
    <line x1="0" y1="0" x2="10" y2="-8"/>
    <line x1="0" y1="0" x2="-11" y2="4"/>
    <line x1="0" y1="0" x2="5" y2="11"/>
    <line x1="0" y1="0" x2="12" y2="4"/>
    <line x1="-8" y1="-12" x2="-12" y2="-13"/>
    <line x1="10" y1="-8" x2="13" y2="-11"/>
    <line x1="5" y1="11" x2="7" y2="13"/>
  </g>
  <!-- Outer nodes -->
  <circle cx="-12" cy="-13" r="0.9" fill="#3a4858"/>
  <circle cx="13" cy="-11" r="0.9" fill="#3a4858"/>
