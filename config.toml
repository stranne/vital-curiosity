base_url = "https://blog.stranne.se"
title = "Vital Curiosity"
description = "Curiosity driven learning"
default_language = "en"
author = "Olof Stranne"

ignored_content = ["*.png", "*.jpg", "*.jpeg"]
compile_sass = true
minify_html = true
generate_feeds = true
feed_filenames = ["atom.xml", "rss.xml"]

taxonomies = [
    { name = "tags", feed = true },
]

[markdown]
render_emoji = true
external_links_target_blank = true
external_links_no_follow = false
external_links_no_referrer = true
smart_punctuation = true
[markdown.highlighting]
enabled = true
theme = "material-theme-ocean"

[slugify]
paths = "on"
anchors = "on"

[extra]
author_name = "Olof Stranne"
author_role = "Software Developer"
background_image = "/img/bg.jpg"
# Umami Cloud analytics - set website_id to enable, leave empty to disable
umami_website_id = "63af043f-ba14-4102-8376-07ca8e32eac5"
